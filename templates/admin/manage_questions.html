<!DOCTYPE html>
<html>
<head>
    <title>Manage Questions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
    <canvas id="galaxy"></canvas>

<div class="admin-wrapper">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Admin Panel 👑</h2>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/questions">Manage Questions</a>
        <a href="/admin/users">Manage Users</a>
        <a href="/admin/logout" class="logout">Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h1>Manage Questions</h1>

        <!-- ADD QUESTION FORM -->
        <h3>Add New Question</h3>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <input type="number" name="year" placeholder="Year" required><br><br>
            <input type="text" name="question" placeholder="Question" required style="width:100%;"><br><br>

            <input type="text" name="opt1" placeholder="Option 1" required><br><br>
            <input type="text" name="opt2" placeholder="Option 2" required><br><br>
            <input type="text" name="opt3" placeholder="Option 3" required><br><br>
            <input type="text" name="opt4" placeholder="Option 4" required><br><br>

            <input type="text" name="answer" placeholder="Correct Answer" required><br><br>

            <button type="submit">Add Question</button>
        </form>

        <hr><br>

        <!-- QUESTIONS LIST -->
        <h3>All Questions</h3>

        <ul>
            {% for q in questions %}
                <li>
                    <strong>{{ q.year }}</strong> — {{ q.question }}
                </li>
            {% endfor %}
        </ul>

    </div>

</div>
</body>
</html>
