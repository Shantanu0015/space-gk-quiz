<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
    <canvas id="galaxy"></canvas>

<div class="admin-wrapper">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Admin Panel 👑</h2>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/questions">Manage Questions</a>
        <a href="/admin/users">Manage Users</a>
        <a href="/admin/logout" class="logout">Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h1>Manage Users</h1>

        <table border="1" cellpadding="10" cellspacing="0" style="background:white;">
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Action</th>
            </tr>

            {% for user in users %}
            <tr>
                <td>{{ user[0] }}</td>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
                <td>
                    {% if user[2] != 'admin' %}
                        <a href="/admin/make_admin/{{ user[0] }}">
                            Make Admin
                        </a>
                    {% else %}
                        —
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </table>

    </div>

</div>
</body>
</html>
